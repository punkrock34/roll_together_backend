# Enable the following Apache modules first:
#   a2enmod proxy proxy_http proxy_wstunnel headers
#
# If your backend is published on a different host port, replace 3000 below
# with your configured HOST_PORT value.

<VirtualHost *:80>
    ServerName example.com

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass "/ws"  "ws://127.0.0.1:3000/ws"
    ProxyPassReverse "/ws"  "ws://127.0.0.1:3000/ws"

    ProxyPass "/"  "http://127.0.0.1:3000/"
    ProxyPassReverse "/"  "http://127.0.0.1:3000/"
</VirtualHost>
